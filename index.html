<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Blackboard</title>
<style>
  :root{
    --board: #000000;
    --ink: #ffffff;
    --chalk-white: #ffffff;
    --chalk-yellow: #f2d675;
    --chalk-coral: #e2896f;
    --chalk-sky: #7fb3d5;
    --chalk-sage: #93b990;
    --chalk-pink: #d99bc0;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background: #000000;
    font-family: 'Helvetica Neue', Arial, ui-sans-serif, sans-serif;
    color: var(--ink);
    -webkit-tap-highlight-color: transparent;
  }
  #app{
    display:flex; flex-direction:column; height:100%;
    padding: 0;
    background: #000000;
  }

  /* ---------- toolbar (minimal floating bar) ---------- */
  #toolbar{
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    z-index:25;
    display:flex; align-items:center; gap:2px;
    max-width: calc(100vw - 24px);
    overflow-x:auto;
    background: rgba(14,14,14,0.94);
    border:1px solid rgba(255,255,255,0.22);
    border-radius:14px;
    padding:6px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.45);
    -ms-overflow-style:none; scrollbar-width:none;
  }
  #toolbar::-webkit-scrollbar{ display:none; }

  .seg{ display:flex; align-items:center; gap:1px; background:rgba(255,255,255,0.05); border-radius:10px; padding:2px; flex-shrink:0; }
  .tsep{ width:1px; height:22px; background:rgba(255,255,255,0.16); margin:0 5px; flex-shrink:0; }

  .tbtn{
    width:34px; height:34px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background:transparent; border:none; border-radius:8px;
    color:#fff; cursor:pointer;
  }
  .tbtn svg{ width:16px; height:16px; }
  .tbtn:hover{ background:rgba(255,255,255,0.14); }
  .tbtn.active{ background:#ffffff; color:#000000; }
  .tbtn[disabled]{ opacity:0.35; cursor:default; }

  .style-swatch-dot{
    width:16px; height:16px; border-radius:50%;
    border:1.5px solid rgba(255,255,255,0.6);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.4);
  }

  .swatch{
    width:18px; height:18px; border-radius:50%;
    cursor:pointer;
    border: 1px solid rgba(255,255,255,0.5);
  }
  .swatch.active{ box-shadow: 0 0 0 2px #0e0e0e, 0 0 0 3.5px #ffffff; }

  .popover{
    display:none;
    position:fixed; top:0; left:0;
    background:rgba(14,14,14,0.97);
    border:1px solid rgba(255,255,255,0.22);
    border-radius:12px;
    padding:14px;
    width:190px;
    flex-direction:column; gap:12px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.5);
    z-index:100;
  }
  .popover.open{ display:flex; }
  .popover-row{ display:flex; align-items:center; gap:9px; }
  .popover-swatches{ justify-content:space-between; }
  .popover-label{
    font-size:11px; letter-spacing:0.4px; text-transform:uppercase; color:#999;
  }
  #widthRange, #brightRange{ flex:1; accent-color:#ffffff; }
  .toggle-row{
    display:flex; align-items:center; gap:8px;
    font-size:12px; cursor:pointer; user-select:none; color:#ddd;
  }
  .toggle-row input{ accent-color:#ffffff; width:14px; height:14px; cursor:pointer; }

  .wheel-wrap{
    position:relative; width:130px; height:130px; margin:0 auto;
    touch-action:none;
  }
  #colorWheelCanvas{ border-radius:50%; cursor:crosshair; display:block; }
  .wheel-pointer{
    position:absolute; width:14px; height:14px; border-radius:50%;
    border:2px solid #ffffff; box-shadow:0 0 0 1px rgba(0,0,0,0.6), 0 0 4px rgba(0,0,0,0.5);
    transform:translate(-50%,-50%);
    pointer-events:none;
    top:50%; left:50%;
  }
  #hexReadout{ font-size:11px; color:#999; letter-spacing:0.3px; }

  /* ---------- board ---------- */
  #boardWrap{
    position:relative;
    flex:1;
    overflow:hidden;
    background: var(--board);
  }
  canvas{
    position:absolute; inset:0;
    width:100%; height:100%;
    touch-action:none;
    cursor: crosshair;
  }

  /* ---------- zoom pill ---------- */
  #zoomPill{
    position:absolute; bottom:16px; right:16px; z-index:20;
    display:flex; align-items:center; gap:1px;
    background: rgba(14,14,14,0.94);
    border:1px solid rgba(255,255,255,0.22);
    border-radius:12px;
    padding:4px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  }
  #zoomLabel{
    font-size:11px; letter-spacing:0.3px; min-width:38px; text-align:center;
    user-select:none; color:#ccc;
  }

  @media (max-width: 720px){
    #toolbar{ top:8px; padding:4px; gap:1px; }
    .tbtn{ width:32px; height:32px; }
    .tbtn svg{ width:15px; height:15px; }
    #zoomPill{ bottom:10px; right:10px; }
  }


  /* ---------- world layer (infinite canvas content) ---------- */
  #worldLayer{
    position:absolute; left:0; top:0; width:0; height:0;
    transform-origin: 0 0;
    pointer-events:none;
  }
  #connectorSvg{ position:absolute; left:0; top:0; overflow:visible; pointer-events:none; }
  #nodesLayer, #imagesLayer{ position:absolute; left:0; top:0; pointer-events:none; }

  .node{
    position:absolute;
    min-width:140px; max-width:260px;
    padding:10px 30px 10px 14px;
    border-radius:12px;
    background:rgba(20,20,20,0.85);
    border:2px solid var(--node-color, #ffffff);
    color:#fff;
    font-size:14px; line-height:1.35;
    cursor:grab;
    pointer-events:auto;
    box-shadow: 0 0 14px -4px var(--node-color, #ffffff);
  }
  .node.dragging{ cursor:grabbing; z-index:5; }
  .node.selected{ box-shadow: 0 0 0 2px #000, 0 0 0 4px var(--node-color,#fff); }
  .node-text{
    outline:none; white-space:pre-wrap; word-break:break-word; user-select:text;
  }
  .node-del, .node-add{
    position:absolute; top:-10px;
    width:20px; height:20px; border-radius:50%;
    background:#000; border:1px solid #ffffff; color:#fff;
    font-size:13px; line-height:1; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity .12s;
  }
  .node:hover .node-del, .node:hover .node-add{ opacity:1; }
  .node-del{ right:-10px; }
  .node-add{ right:14px; font-size:15px; }
  .node-del:hover{ background:#e2896f; }
  .node-add:hover{ background:#93b990; }

  .img-item{
    position:absolute;
    pointer-events:auto;
    cursor:grab;
    border:2px solid transparent;
  }
  .img-item.dragging{ cursor:grabbing; z-index:5; }
  .img-item.selected{ border-color:#ffffff; }
  .img-item img{
    display:block; width:100%; height:100%;
    object-fit:contain; pointer-events:none; user-select:none;
    -webkit-user-drag:none;
  }
  .img-del{
    position:absolute; top:-10px; right:-10px;
    width:20px; height:20px; border-radius:50%;
    background:#000; border:1px solid #ffffff; color:#fff;
    font-size:13px; line-height:1; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity .12s;
  }
  .img-item:hover .img-del{ opacity:1; }
  .img-del:hover{ background:#e2896f; }
  .img-resize{
    position:absolute; right:-6px; bottom:-6px;
    width:14px; height:14px; border-radius:3px;
    background:#ffffff; cursor:nwse-resize;
    opacity:0; transition:opacity .12s;
  }
  .img-item:hover .img-resize{ opacity:1; }
</style>
</head>
<body>
<div id="app">

  <div id="toolbar">
    <div class="seg" id="modeTabs">
      <button class="tbtn active" data-mode="blackboard" title="Blackboard mode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      </button>
      <button class="tbtn" data-mode="mindmap" title="Mind map mode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2.5"/><circle cx="5" cy="19" r="2.5"/><circle cx="19" cy="19" r="2.5"/><path d="M12 7.5v4M12 11.5 6.5 17M12 11.5 17.5 17"/></svg>
      </button>
    </div>

    <div class="tsep"></div>

    <div id="blackboardTools" style="display:flex; align-items:center; gap:1px;">
      <div class="seg" id="toolGroup">
        <button class="tbtn active" data-tool="pen" title="Chalk pen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        </button>
        <button class="tbtn" data-tool="line" title="Straight line">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="20" x2="20" y2="4"/></svg>
        </button>
        <button class="tbtn" data-tool="rect" title="Rectangle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="6" width="16" height="12" rx="1"/></svg>
        </button>
        <button class="tbtn" data-tool="ellipse" title="Circle / Ellipse">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="8" ry="6"/></svg>
        </button>
        <button class="tbtn" data-tool="triangle" title="Triangle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 4 L20 19 L4 19 Z"/></svg>
        </button>
        <button class="tbtn" data-tool="text" title="Text">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="5" x2="20" y2="5"/><line x1="12" y1="5" x2="12" y2="19"/></svg>
        </button>
        <button class="tbtn" data-tool="eraser" title="Eraser">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M20 20H8l-6-6a2 2 0 0 1 0-2.8L13.6 2.6a2 2 0 0 1 2.8 0l5.6 5.6a2 2 0 0 1 0 2.8L14 19"/></svg>
        </button>
        <button class="tbtn" data-tool="pan" title="Pan the canvas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-4 0v5"/><path d="M14 10V4a2 2 0 0 0-4 0v6"/><path d="M10 10.5V6a2 2 0 0 0-4 0v8"/><path d="M6 14v-1a2 2 0 0 0-4 0v3a8 8 0 0 0 8 8h2a8 8 0 0 0 8-8v-3a2 2 0 0 0-4 0v1"/></svg>
        </button>
      </div>

      <div class="tsep"></div>

      <button class="tbtn" id="styleBtn" title="Color, chalk size &amp; snapping">
        <span class="style-swatch-dot" id="styleSwatchDot" style="background:var(--chalk-white)"></span>
      </button>

      <div class="tsep"></div>

      <button class="tbtn" id="addImageBtn" title="Add an image to the board">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      </button>
      <input type="file" id="imageInput" accept="image/*" style="display:none">

      <div class="tsep"></div>

      <button class="tbtn" id="undoBtn" title="Undo (Ctrl+Z)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M3 13a9 9 0 1 0 3-7"/></svg>
      </button>
      <button class="tbtn" id="clearBtn" title="Clear chalk strokes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
      </button>
    </div>

    <div id="mindmapTools" style="display:none; align-items:center; gap:1px;">
      <button class="tbtn" id="addNodeBtn" title="Add a mind map node">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
      </button>
    </div>

    <div class="tsep"></div>

    <button class="tbtn" id="fullscreenBtn" title="Toggle fullscreen">
      <svg id="fsExpandIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
      <svg id="fsCollapseIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M9 3v3a2 2 0 0 1-2 2H4"/><path d="M15 3v3a2 2 0 0 0 2 2h3"/><path d="M9 21v-3a2 2 0 0 0-2-2H4"/><path d="M15 21v-3a2 2 0 0 1 2-2h3"/></svg>
    </button>
  </div>

  <div id="boardWrap">
    <canvas id="board"></canvas>
    <div id="worldLayer">
      <svg id="connectorSvg"></svg>
      <div id="imagesLayer"></div>
      <div id="nodesLayer"></div>
    </div>
    <div id="zoomPill">
      <button class="tbtn" id="zoomOutBtn" title="Zoom out">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <span id="zoomLabel">100%</span>
      <button class="tbtn" id="zoomInBtn" title="Zoom in">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <div class="tsep"></div>
      <button class="tbtn" id="zoomResetBtn" title="Reset view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 4v5h5"/></svg>
      </button>
    </div>
  </div>

</div>

<div class="popover" id="stylePopover">
  <div class="popover-row" style="justify-content:space-between;">
    <span class="popover-label">Color</span>
    <span id="hexReadout">#FFFFFF</span>
  </div>
  <div class="wheel-wrap">
    <canvas id="colorWheelCanvas" width="130" height="130"></canvas>
    <div class="wheel-pointer" id="wheelPointer"></div>
  </div>
  <div class="popover-row">
    <span class="popover-label">Bright</span>
    <input type="range" id="brightRange" min="25" max="100" value="100">
  </div>
  <div class="popover-row popover-swatches" id="colorGroup">
    <div class="swatch active" style="background:var(--chalk-white)" data-color="var(--chalk-white)" title="White"></div>
    <div class="swatch" style="background:var(--chalk-yellow)" data-color="var(--chalk-yellow)" title="Yellow"></div>
    <div class="swatch" style="background:var(--chalk-coral)" data-color="var(--chalk-coral)" title="Coral"></div>
    <div class="swatch" style="background:var(--chalk-sky)" data-color="var(--chalk-sky)" title="Sky"></div>
    <div class="swatch" style="background:var(--chalk-sage)" data-color="var(--chalk-sage)" title="Sage"></div>
    <div class="swatch" style="background:var(--chalk-pink)" data-color="var(--chalk-pink)" title="Pink"></div>
  </div>
  <div class="popover-row">
    <span class="popover-label">Size</span>
    <input type="range" id="widthRange" min="2" max="14" value="4">
  </div>
  <label class="toggle-row">
    <input type="checkbox" id="snapToggle" checked>
    Snap chalk to shapes
  </label>
</div>

<script>
(function(){
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const boardWrap = document.getElementById('boardWrap');

  const state = {
    mode: 'blackboard', // 'blackboard' | 'mindmap'
    tool: 'pen',
    color: getCss('--chalk-white'),
    width: 4,
    snap: true,
    strokes: [],
    drawing: false,
    startPt: null,
    currentPoints: [],
    nodes: [],
    images: [],
    selectedId: null,
  };

  // ---------------- infinite canvas: pan & zoom ----------------
  const view = { x: 0, y: 0, scale: 1 };
  const worldLayer = document.getElementById('worldLayer');
  const connectorSvg = document.getElementById('connectorSvg');
  const nodesLayer = document.getElementById('nodesLayer');
  const imagesLayer = document.getElementById('imagesLayer');
  let panState = null; // {startX, startY, vx, vy}
  let spacePan = false;
  let nextId = 1;

  function screenToWorld(clientX, clientY){
    const rect = boardWrap.getBoundingClientRect();
    return {
      x: (clientX - rect.left - view.x) / view.scale,
      y: (clientY - rect.top - view.y) / view.scale,
    };
  }

  function applyViewTransform(){
    worldLayer.style.transform = `translate(${view.x}px, ${view.y}px) scale(${view.scale})`;
    document.getElementById('zoomLabel').textContent = Math.round(view.scale * 100) + '%';
    redrawAll();
  }

  function setZoom(newScale, anchorClientX, anchorClientY){
    newScale = Math.min(4, Math.max(0.15, newScale));
    const rect = boardWrap.getBoundingClientRect();
    const ax = anchorClientX != null ? anchorClientX - rect.left : rect.width / 2;
    const ay = anchorClientY != null ? anchorClientY - rect.top : rect.height / 2;
    const worldBefore = { x: (ax - view.x) / view.scale, y: (ay - view.y) / view.scale };
    view.scale = newScale;
    view.x = ax - worldBefore.x * view.scale;
    view.y = ay - worldBefore.y * view.scale;
    applyViewTransform();
  }

  function viewCenterWorld(){
    const rect = boardWrap.getBoundingClientRect();
    return screenToWorld(rect.left + rect.width / 2, rect.top + rect.height / 2);
  }

  boardWrap.addEventListener('wheel', (e) => {
    e.preventDefault();
    if(e.ctrlKey || e.metaKey){
      const delta = -e.deltaY * 0.01;
      setZoom(view.scale * (1 + delta), e.clientX, e.clientY);
    } else {
      view.x -= e.deltaX;
      view.y -= e.deltaY;
      applyViewTransform();
    }
  }, { passive: false });

  window.addEventListener('keydown', (e) => {
    if(e.code === 'Space' && !spacePan){
      spacePan = true;
      canvas.style.cursor = 'grab';
    }
  });
  window.addEventListener('keyup', (e) => {
    if(e.code === 'Space'){
      spacePan = false;
      updateCursor();
    }
  });

  function startPan(e){
    panState = { startX: e.clientX, startY: e.clientY, vx: view.x, vy: view.y };
    canvas.setPointerCapture(e.pointerId);
    canvas.style.cursor = 'grabbing';
  }
  function movePan(e){
    if(!panState) return;
    view.x = panState.vx + (e.clientX - panState.startX);
    view.y = panState.vy + (e.clientY - panState.startY);
    applyViewTransform();
  }
  function endPan(){
    if(!panState) return;
    panState = null;
    updateCursor();
  }

  function updateCursor(){
    if(state.mode === 'mindmap'){ canvas.style.cursor = 'grab'; return; }
    if(spacePan){ canvas.style.cursor = 'grab'; return; }
    canvas.style.cursor = state.tool === 'eraser' ? 'cell' : (state.tool === 'text' ? 'text' : (state.tool === 'pan' ? 'grab' : 'crosshair'));
  }

  function shouldPan(e){
    return e.button === 1 || spacePan || (state.mode === 'blackboard' && state.tool === 'pan') || state.mode === 'mindmap';
  }

  function getCss(varName){
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  }
  function boardBg(){ return getCss('--board'); }

  // ---------------- canvas sizing ----------------
  function resizeCanvas(){
    const dpr = window.devicePixelRatio || 1;
    const rect = boardWrap.getBoundingClientRect();
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    redrawAll();
  }
  window.addEventListener('resize', resizeCanvas);

  // ---------------- geometry helpers ----------------
  function dist(a, b){ return Math.hypot(a.x - b.x, a.y - b.y); }

  function pathLength(pts){
    let d = 0;
    for(let i = 1; i < pts.length; i++) d += dist(pts[i-1], pts[i]);
    return d;
  }

  function boundingBox(pts){
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for(const p of pts){
      if(p.x < minX) minX = p.x;
      if(p.y < minY) minY = p.y;
      if(p.x > maxX) maxX = p.x;
      if(p.y > maxY) maxY = p.y;
    }
    return {minX, minY, maxX, maxY, w: maxX - minX, h: maxY - minY};
  }

  function shoelaceArea(pts){
    let sum = 0;
    for(let i = 0; i < pts.length; i++){
      const p1 = pts[i], p2 = pts[(i+1) % pts.length];
      sum += (p1.x * p2.y - p2.x * p1.y);
    }
    return Math.abs(sum) / 2;
  }

  function perpendicularDistance(pt, lineStart, lineEnd){
    const dx = lineEnd.x - lineStart.x, dy = lineEnd.y - lineStart.y;
    const len = Math.hypot(dx, dy);
    if(len === 0) return dist(pt, lineStart);
    const t = ((pt.x - lineStart.x) * dx + (pt.y - lineStart.y) * dy) / (len * len);
    const projX = lineStart.x + t * dx, projY = lineStart.y + t * dy;
    return Math.hypot(pt.x - projX, pt.y - projY);
  }

  function rdp(points, epsilon){
    if(points.length < 3) return points.slice();
    let dmax = 0, index = 0;
    const end = points.length - 1;
    for(let i = 1; i < end; i++){
      const d = perpendicularDistance(points[i], points[0], points[end]);
      if(d > dmax){ dmax = d; index = i; }
    }
    if(dmax > epsilon){
      const left = rdp(points.slice(0, index + 1), epsilon);
      const right = rdp(points.slice(index), epsilon);
      return left.slice(0, -1).concat(right);
    }
    return [points[0], points[end]];
  }

  // Try to recognise a rough freehand stroke as a basic shape.
  // Returns a clean shape-stroke object, or null to keep the freehand stroke.
  function recognizeShape(rawPoints, color, width){
    if(rawPoints.length < 6) return null;

    const bbox = boundingBox(rawPoints);
    const diag = Math.hypot(bbox.w, bbox.h);
    if(diag < 18) return null; // too small / just a dot or tap

    const first = rawPoints[0], last = rawPoints[rawPoints.length - 1];
    const closed = dist(first, last) < diag * 0.28;

    if(!closed){
      // candidate: straight line
      const simplified = rdp(rawPoints, diag * 0.05);
      const straightness = pathLength(rawPoints) / diag;
      if(simplified.length <= 3 && straightness < 1.25){
        return { type: 'line', p1: first, p2: last, color, width };
      }
      return null; // open squiggle, leave freehand
    }

    // closed shape candidate
    const area = shoelaceArea(rawPoints);
    const perimeter = pathLength(rawPoints);
    if(perimeter === 0) return null;
    const circularity = (4 * Math.PI * area) / (perimeter * perimeter);

    const corners = rdp(rawPoints, diag * 0.09);
    // corners[0] and corners[last] are close to each other since shape is closed;
    // corner count = distinct simplified vertices excluding the closing duplicate
    let cornerCount = corners.length;
    if(cornerCount > 1 && dist(corners[0], corners[cornerCount - 1]) < diag * 0.12){
      cornerCount -= 1;
    }

    if(circularity > 0.68 && cornerCount >= 5){
      const cx = (bbox.minX + bbox.maxX) / 2;
      const cy = (bbox.minY + bbox.maxY) / 2;
      return { type: 'ellipse', cx, cy, rx: bbox.w / 2, ry: bbox.h / 2, color, width };
    }

    if(cornerCount === 3){
      return { type: 'triangle', pts: corners.slice(0, 3), color, width };
    }

    if(cornerCount === 4 || cornerCount === 5){
      return { type: 'rect', x: bbox.minX, y: bbox.minY, w: bbox.w, h: bbox.h, color, width };
    }

    return null; // not confidently a basic shape — keep the freehand chalk stroke
  }

  // ---------------- rendering ----------------
  function drawFreehand(c, pts, color, width, chalky){
    if(pts.length < 2){
      if(pts.length === 1){
        c.beginPath();
        c.fillStyle = color;
        c.globalAlpha = 0.9;
        c.arc(pts[0].x, pts[0].y, width / 2, 0, Math.PI * 2);
        c.fill();
        c.globalAlpha = 1;
      }
      return;
    }
    c.lineCap = 'round';
    c.lineJoin = 'round';
    c.strokeStyle = color;
    if(!chalky){
      c.lineWidth = width;
      c.globalAlpha = 1;
      c.beginPath();
      c.moveTo(pts[0].x, pts[0].y);
      for(let i = 1; i < pts.length; i++) c.lineTo(pts[i].x, pts[i].y);
      c.stroke();
      return;
    }
    // chalky textured stroke: base pass + light grain pass
    c.globalAlpha = 0.85;
    c.lineWidth = width;
    c.beginPath();
    c.moveTo(pts[0].x, pts[0].y);
    for(let i = 1; i < pts.length; i++) c.lineTo(pts[i].x, pts[i].y);
    c.stroke();

    c.globalAlpha = 0.18;
    c.lineWidth = Math.max(1, width * 0.5);
    for(let i = 1; i < pts.length; i++){
      const jitter = (Math.random() - 0.5) * width * 0.35;
      c.beginPath();
      c.moveTo(pts[i-1].x + jitter, pts[i-1].y + jitter);
      c.lineTo(pts[i].x - jitter, pts[i].y - jitter);
      c.stroke();
    }
    c.globalAlpha = 1;
  }

  function drawShape(c, s){
    c.strokeStyle = s.color;
    c.lineWidth = s.width;
    c.lineCap = 'round';
    c.lineJoin = 'round';
    c.globalAlpha = 1;
    c.beginPath();
    if(s.type === 'line'){
      c.moveTo(s.p1.x, s.p1.y);
      c.lineTo(s.p2.x, s.p2.y);
    } else if(s.type === 'rect'){
      c.rect(s.x, s.y, s.w, s.h);
    } else if(s.type === 'ellipse'){
      c.ellipse(s.cx, s.cy, Math.max(Math.abs(s.rx), 1), Math.max(Math.abs(s.ry), 1), 0, 0, Math.PI * 2);
    } else if(s.type === 'triangle'){
      c.moveTo(s.pts[0].x, s.pts[0].y);
      c.lineTo(s.pts[1].x, s.pts[1].y);
      c.lineTo(s.pts[2].x, s.pts[2].y);
      c.closePath();
    }
    c.stroke();
  }

  function renderStroke(c, s){
    if(s.type === 'freehand'){
      drawFreehand(c, s.points, s.color, s.width, true);
    } else if(s.type === 'erase'){
      drawFreehand(c, s.points, boardBg(), s.width, false);
    } else if(s.type === 'text'){
      c.globalAlpha = 1;
      c.fillStyle = s.color;
      c.font = `${s.size}px 'Helvetica Neue', Arial, sans-serif`;
      c.textBaseline = 'alphabetic';
      c.fillText(s.text, s.x, s.y);
    } else {
      drawShape(c, s);
    }
  }

  function redrawAll(){
    const dpr = window.devicePixelRatio || 1;
    const rect = boardWrap.getBoundingClientRect();
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, rect.width, rect.height);
    ctx.fillStyle = boardBg();
    ctx.fillRect(0, 0, rect.width, rect.height);
    ctx.setTransform(dpr * view.scale, 0, 0, dpr * view.scale, view.x * dpr, view.y * dpr);
    for(const s of state.strokes) renderStroke(ctx, s);
  }

  // ---------------- pointer input ----------------
  function getPos(e){
    return screenToWorld(e.clientX, e.clientY);
  }

  canvas.addEventListener('pointerdown', (e) => {
    clearSelection();
    if(shouldPan(e)){
      startPan(e);
      return;
    }
    canvas.setPointerCapture(e.pointerId);
    state.drawing = true;
    const p = getPos(e);
    state.startPt = p;
    state.currentPoints = [p];
  });

  canvas.addEventListener('pointermove', (e) => {
    if(panState){ movePan(e); return; }
    if(!state.drawing) return;
    if(state.tool === 'text') return;
    const p = getPos(e);

    if(state.tool === 'pen' || state.tool === 'eraser'){
      state.currentPoints.push(p);
      redrawAll();
      drawFreehand(
        ctx, state.currentPoints,
        state.tool === 'eraser' ? boardBg() : state.color,
        state.tool === 'eraser' ? state.width * 3 : state.width,
        state.tool === 'pen'
      );
    } else {
      // shape tools: rubber-band preview
      redrawAll();
      previewShape(state.tool, state.startPt, p);
    }
  });

  function endStroke(e){
    if(panState){ endPan(); return; }
    if(!state.drawing) return;
    state.drawing = false;
    const p = getPos(e);

    if(state.tool === 'text'){
      if(dist(state.startPt, p) < 6) openTextEditor(p.x, p.y);
      state.currentPoints = [];
      state.startPt = null;
      return;
    }

    if(state.tool === 'pen'){
      const pts = state.currentPoints;
      let shape = null;
      if(state.snap) shape = recognizeShape(pts, state.color, state.width);
      if(shape) state.strokes.push(shape);
      else if(pts.length >= 2) state.strokes.push({ type: 'freehand', points: pts, color: state.color, width: state.width });
      else if(pts.length === 1) state.strokes.push({ type: 'freehand', points: pts, color: state.color, width: state.width });
    } else if(state.tool === 'eraser'){
      const pts = state.currentPoints;
      if(pts.length >= 1) state.strokes.push({ type: 'erase', points: pts, width: state.width * 3 });
    } else {
      const shape = finalizeShape(state.tool, state.startPt, p);
      if(shape) state.strokes.push(shape);
    }

    state.currentPoints = [];
    state.startPt = null;
    redrawAll();
  }

  canvas.addEventListener('pointerup', endStroke);
  canvas.addEventListener('pointercancel', endStroke);
  canvas.addEventListener('pointerleave', (e) => { if(state.drawing) endStroke(e); });

  function previewShape(tool, start, end){
    const shape = finalizeShape(tool, start, end);
    if(shape) drawShape(ctx, shape);
  }

  function finalizeShape(tool, start, end){
    if(dist(start, end) < 2) return null;
    if(tool === 'line'){
      return { type: 'line', p1: start, p2: end, color: state.color, width: state.width };
    }
    if(tool === 'rect'){
      const x = Math.min(start.x, end.x), y = Math.min(start.y, end.y);
      const w = Math.abs(end.x - start.x), h = Math.abs(end.y - start.y);
      return { type: 'rect', x, y, w, h, color: state.color, width: state.width };
    }
    if(tool === 'ellipse'){
      const cx = (start.x + end.x) / 2, cy = (start.y + end.y) / 2;
      return { type: 'ellipse', cx, cy, rx: Math.abs(end.x - start.x) / 2, ry: Math.abs(end.y - start.y) / 2, color: state.color, width: state.width };
    }
    if(tool === 'triangle'){
      const x = Math.min(start.x, end.x), w = Math.abs(end.x - start.x);
      const top = { x: x + w / 2, y: Math.min(start.y, end.y) };
      const bl = { x: Math.min(start.x, end.x), y: Math.max(start.y, end.y) };
      const br = { x: Math.max(start.x, end.x), y: Math.max(start.y, end.y) };
      return { type: 'triangle', pts: [top, bl, br], color: state.color, width: state.width };
    }
    return null;
  }

  // ---------------- text tool ----------------
  function openTextEditor(x, y){
    const existing = document.getElementById('textEditorInput');
    if(existing) existing.remove();

    const fontSize = 14 + state.width * 3;
    const input = document.createElement('input');
    input.type = 'text';
    input.id = 'textEditorInput';
    input.autocomplete = 'off';
    input.spellcheck = false;
    Object.assign(input.style, {
      position: 'absolute',
      left: x + 'px',
      top: (y - fontSize * 0.8) + 'px',
      font: `${fontSize}px 'Helvetica Neue', Arial, sans-serif`,
      color: state.color,
      background: 'transparent',
      border: '1px dashed #ffffff',
      outline: 'none',
      padding: '2px 4px',
      minWidth: '80px',
      zIndex: '50',
    });
    input.style.pointerEvents = 'auto';
    worldLayer.appendChild(input);
    input.focus();

    let done = false;
    const commit = () => {
      if(done) return;
      done = true;
      const text = input.value.trim();
      if(text){
        state.strokes.push({ type: 'text', x, y, text, color: state.color, size: fontSize });
      }
      input.remove();
      redrawAll();
    };
    const cancel = () => {
      if(done) return;
      done = true;
      input.remove();
    };

    input.addEventListener('keydown', (e) => {
      e.stopPropagation();
      if(e.key === 'Enter'){ e.preventDefault(); commit(); }
      else if(e.key === 'Escape'){ e.preventDefault(); cancel(); }
    });
    input.addEventListener('blur', commit);
  }

  // ---------------- toolbar wiring ----------------
  document.getElementById('toolGroup').addEventListener('click', (e) => {
    const btn = e.target.closest('button.tbtn');
    if(!btn) return;
    document.querySelectorAll('#toolGroup .tbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.tool = btn.dataset.tool;
    updateCursor();
  });

  const styleSwatchDot = document.getElementById('styleSwatchDot');
  const hexReadout = document.getElementById('hexReadout');

  // ---------------- HSV color wheel ----------------
  const wheelCanvas = document.getElementById('colorWheelCanvas');
  const wheelCtx = wheelCanvas.getContext('2d');
  const wheelPointer = document.getElementById('wheelPointer');
  const brightRange = document.getElementById('brightRange');
  const wheelSize = wheelCanvas.width; // square canvas
  const wheelRadius = wheelSize / 2;
  let curHue = 0, curSat = 0, curVal = 1; // hue 0-360, sat/val 0-1

  function hsvToRgb(h, s, v){
    h = ((h % 360) + 360) % 360;
    const c = v * s;
    const x = c * (1 - Math.abs((h / 60) % 2 - 1));
    const m = v - c;
    let r=0,g=0,b=0;
    if(h < 60){ r=c; g=x; b=0; }
    else if(h < 120){ r=x; g=c; b=0; }
    else if(h < 180){ r=0; g=c; b=x; }
    else if(h < 240){ r=0; g=x; b=c; }
    else if(h < 300){ r=x; g=0; b=c; }
    else { r=c; g=0; b=x; }
    return [Math.round((r+m)*255), Math.round((g+m)*255), Math.round((b+m)*255)];
  }

  function rgbToHsv(r, g, b){
    r/=255; g/=255; b/=255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b);
    const d = max - min;
    let h = 0;
    if(d !== 0){
      if(max === r) h = 60 * (((g-b)/d) % 6);
      else if(max === g) h = 60 * ((b-r)/d + 2);
      else h = 60 * ((r-g)/d + 4);
    }
    if(h < 0) h += 360;
    const s = max === 0 ? 0 : d / max;
    const v = max;
    return [h, s, v];
  }

  function rgbToHex(r, g, b){
    return '#' + [r,g,b].map(n => n.toString(16).padStart(2,'0')).join('').toUpperCase();
  }

  function drawWheel(){
    const img = wheelCtx.createImageData(wheelSize, wheelSize);
    for(let y = 0; y < wheelSize; y++){
      for(let x = 0; x < wheelSize; x++){
        const dx = x - wheelRadius, dy = y - wheelRadius;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const idx = (y * wheelSize + x) * 4;
        if(dist <= wheelRadius){
          const hue = (Math.atan2(dy, dx) * 180 / Math.PI + 360) % 360;
          const sat = Math.min(1, dist / wheelRadius);
          const [r,g,b] = hsvToRgb(hue, sat, curVal);
          img.data[idx] = r; img.data[idx+1] = g; img.data[idx+2] = b; img.data[idx+3] = 255;
        } else {
          img.data[idx+3] = 0;
        }
      }
    }
    wheelCtx.putImageData(img, 0, 0);
  }

  function updatePointerFromHueSat(){
    const rad = curHue * Math.PI / 180;
    const dist = curSat * wheelRadius;
    wheelPointer.style.left = (wheelRadius + Math.cos(rad) * dist) + 'px';
    wheelPointer.style.top = (wheelRadius + Math.sin(rad) * dist) + 'px';
  }

  function applyColor(updateActiveSwatch){
    const [r,g,b] = hsvToRgb(curHue, curSat, curVal);
    state.color = `rgb(${r}, ${g}, ${b})`;
    styleSwatchDot.style.background = state.color;
    hexReadout.textContent = rgbToHex(r,g,b);
    if(updateActiveSwatch !== false){
      document.querySelectorAll('#colorGroup .swatch').forEach(s => s.classList.remove('active'));
    }
  }

  function setColorFromHueSat(hue, sat, val){
    curHue = hue; curSat = sat;
    if(val != null) curVal = val;
    updatePointerFromHueSat();
    applyColor();
  }

  function wheelPointFromEvent(e){
    const rect = wheelCanvas.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    const dx = x - wheelRadius, dy = y - wheelRadius;
    const dist = Math.min(wheelRadius, Math.sqrt(dx*dx + dy*dy));
    const hue = (Math.atan2(dy, dx) * 180 / Math.PI + 360) % 360;
    const sat = dist / wheelRadius;
    return { hue, sat };
  }

  let wheelDragging = false;
  wheelCanvas.addEventListener('pointerdown', (e) => {
    wheelDragging = true;
    wheelCanvas.setPointerCapture(e.pointerId);
    const { hue, sat } = wheelPointFromEvent(e);
    setColorFromHueSat(hue, sat);
  });
  wheelCanvas.addEventListener('pointermove', (e) => {
    if(!wheelDragging) return;
    const { hue, sat } = wheelPointFromEvent(e);
    setColorFromHueSat(hue, sat);
  });
  wheelCanvas.addEventListener('pointerup', () => { wheelDragging = false; });
  wheelCanvas.addEventListener('pointercancel', () => { wheelDragging = false; });

  brightRange.addEventListener('input', (e) => {
    curVal = Number(e.target.value) / 100;
    drawWheel();
    applyColor();
  });

  drawWheel();
  updatePointerFromHueSat();
  applyColor();

  document.getElementById('colorGroup').addEventListener('click', (e) => {
    const sw = e.target.closest('.swatch');
    if(!sw) return;
    document.querySelectorAll('#colorGroup .swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    const rgb = getComputedStyle(sw).backgroundColor.match(/\d+/g).map(Number);
    const [h, s, v] = rgbToHsv(rgb[0], rgb[1], rgb[2]);
    curHue = h; curSat = s; curVal = v;
    brightRange.value = Math.round(v * 100);
    drawWheel();
    updatePointerFromHueSat();
    applyColor(false);
  });

  // ---------------- popover open/close (fixed positioning, escapes toolbar clipping) ----------------
  const styleBtn = document.getElementById('styleBtn');
  const stylePopover = document.getElementById('stylePopover');
  styleBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const isOpen = stylePopover.classList.contains('open');
    if(isOpen){
      stylePopover.classList.remove('open');
      return;
    }
    const rect = styleBtn.getBoundingClientRect();
    stylePopover.classList.add('open');
    const popRect = stylePopover.getBoundingClientRect();
    let left = rect.left + rect.width / 2 - popRect.width / 2;
    left = Math.max(8, Math.min(left, window.innerWidth - popRect.width - 8));
    let top = rect.bottom + 10;
    if(top + popRect.height > window.innerHeight - 8) top = rect.top - popRect.height - 10;
    stylePopover.style.left = left + 'px';
    stylePopover.style.top = top + 'px';
  });
  stylePopover.addEventListener('click', (e) => e.stopPropagation());
  document.addEventListener('click', () => stylePopover.classList.remove('open'));
  window.addEventListener('resize', () => stylePopover.classList.remove('open'));

  document.getElementById('widthRange').addEventListener('input', (e) => {
    state.width = Number(e.target.value);
  });

  document.getElementById('snapToggle').addEventListener('change', (e) => {
    state.snap = e.target.checked;
  });

  document.getElementById('undoBtn').addEventListener('click', () => {
    state.strokes.pop();
    redrawAll();
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    state.strokes = [];
    redrawAll();
  });

  const fullscreenBtn = document.getElementById('fullscreenBtn');
  const fsExpandIcon = document.getElementById('fsExpandIcon');
  const fsCollapseIcon = document.getElementById('fsCollapseIcon');

  function updateFsIcon(){
    const isFs = !!document.fullscreenElement;
    fsExpandIcon.style.display = isFs ? 'none' : '';
    fsCollapseIcon.style.display = isFs ? '' : 'none';
  }

  fullscreenBtn.addEventListener('click', () => {
    if(!document.fullscreenElement){
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  });

  document.addEventListener('fullscreenchange', () => {
    updateFsIcon();
    resizeCanvas();
  });

  window.addEventListener('keydown', (e) => {
    if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z'){
      e.preventDefault();
      state.strokes.pop();
      redrawAll();
    }
  });

  // ---------------- mode switching ----------------
  const blackboardTools = document.getElementById('blackboardTools');
  const mindmapTools = document.getElementById('mindmapTools');

  document.getElementById('modeTabs').addEventListener('click', (e) => {
    const btn = e.target.closest('.tbtn');
    if(!btn) return;
    document.querySelectorAll('#modeTabs .tbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.mode = btn.dataset.mode;
    blackboardTools.style.display = state.mode === 'blackboard' ? 'flex' : 'none';
    mindmapTools.style.display = state.mode === 'mindmap' ? 'flex' : 'none';
    clearSelection();
    updateCursor();
  });

  // ---------------- zoom controls ----------------
  document.getElementById('zoomInBtn').addEventListener('click', () => setZoom(view.scale * 1.25));
  document.getElementById('zoomOutBtn').addEventListener('click', () => setZoom(view.scale / 1.25));
  document.getElementById('zoomResetBtn').addEventListener('click', () => { view.x = 0; view.y = 0; view.scale = 1; applyViewTransform(); });

  // ---------------- selection ----------------
  function clearSelection(){
    if(!state.selectedId) return;
    state.selectedId = null;
    document.querySelectorAll('.node.selected, .img-item.selected').forEach(el => el.classList.remove('selected'));
  }

  window.addEventListener('keydown', (e) => {
    if((e.key === 'Delete' || e.key === 'Backspace') && state.selectedId){
      const active = document.activeElement;
      if(active && active.isContentEditable) return; // don't hijack text editing
      e.preventDefault();
      deleteNode(state.selectedId);
      deleteImage(state.selectedId);
      state.selectedId = null;
    }
  });

  // ---------------- mind map nodes ----------------
  const NODE_COLORS = [getCss('--chalk-white'), getCss('--chalk-sky'), getCss('--chalk-sage'), getCss('--chalk-coral'), getCss('--chalk-yellow'), getCss('--chalk-pink')];

  function addNode(x, y, text, parentId){
    const depth = parentId ? (state.nodes.find(n => n.id === parentId)?.depth ?? 0) + 1 : 0;
    const node = {
      id: 'n' + (nextId++),
      x, y,
      text: text || 'New idea',
      color: NODE_COLORS[depth % NODE_COLORS.length],
      parentId: parentId || null,
      depth,
    };
    state.nodes.push(node);
    renderNodes();
    return node;
  }

  function deleteNode(id){
    const node = state.nodes.find(n => n.id === id);
    if(!node) return;
    const toRemove = new Set([id]);
    let changed = true;
    while(changed){
      changed = false;
      for(const n of state.nodes){
        if(n.parentId && toRemove.has(n.parentId) && !toRemove.has(n.id)){
          toRemove.add(n.id);
          changed = true;
        }
      }
    }
    state.nodes = state.nodes.filter(n => !toRemove.has(n.id));
    renderNodes();
  }

  function renderNodes(){
    const seen = new Set();
    for(const node of state.nodes){
      seen.add(node.id);
      let el = nodesLayer.querySelector(`[data-id="${node.id}"]`);
      if(!el){
        el = document.createElement('div');
        el.className = 'node';
        el.dataset.id = node.id;
        el.innerHTML = `<button class="node-del" title="Delete">×</button><div class="node-text" contenteditable="true" spellcheck="false"></div><button class="node-add" title="Add child idea">+</button>`;
        nodesLayer.appendChild(el);
        wireNodeEl(el, node);
      }
      el.style.setProperty('--node-color', node.color);
      el.style.left = node.x + 'px';
      el.style.top = node.y + 'px';
      const textEl = el.querySelector('.node-text');
      if(document.activeElement !== textEl && textEl.textContent !== node.text){
        textEl.textContent = node.text;
      }
    }
    nodesLayer.querySelectorAll('.node').forEach(el => {
      if(!seen.has(el.dataset.id)) el.remove();
    });
    requestAnimationFrame(drawConnectors);
  }

  function wireNodeEl(el, nodeRef){
    const textEl = el.querySelector('.node-text');
    const delBtn = el.querySelector('.node-del');
    const addBtn = el.querySelector('.node-add');
    let dragInfo = null;

    el.addEventListener('pointerdown', (e) => {
      if(e.target === delBtn || e.target === addBtn || e.target === textEl) return;
      e.stopPropagation();
      clearSelection();
      state.selectedId = el.dataset.id;
      el.classList.add('selected');
      const node = state.nodes.find(n => n.id === el.dataset.id);
      if(!node) return;
      dragInfo = { startX: e.clientX, startY: e.clientY, nx: node.x, ny: node.y };
      el.classList.add('dragging');
      el.setPointerCapture(e.pointerId);
    });
    el.addEventListener('pointermove', (e) => {
      if(!dragInfo) return;
      const node = state.nodes.find(n => n.id === el.dataset.id);
      if(!node) return;
      node.x = dragInfo.nx + (e.clientX - dragInfo.startX) / view.scale;
      node.y = dragInfo.ny + (e.clientY - dragInfo.startY) / view.scale;
      el.style.left = node.x + 'px';
      el.style.top = node.y + 'px';
      drawConnectors();
    });
    function endDrag(){
      dragInfo = null;
      el.classList.remove('dragging');
    }
    el.addEventListener('pointerup', endDrag);
    el.addEventListener('pointercancel', endDrag);

    el.addEventListener('pointerdown', (e) => { if(e.target === textEl) e.stopPropagation(); });
    textEl.addEventListener('pointerdown', (e) => e.stopPropagation());
    textEl.addEventListener('blur', () => {
      const node = state.nodes.find(n => n.id === el.dataset.id);
      if(node) node.text = textEl.textContent.trim() || 'New idea';
    });
    textEl.addEventListener('keydown', (e) => {
      e.stopPropagation();
      if(e.key === 'Enter'){ e.preventDefault(); textEl.blur(); }
    });

    delBtn.addEventListener('pointerdown', (e) => e.stopPropagation());
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteNode(el.dataset.id);
    });
    addBtn.addEventListener('pointerdown', (e) => e.stopPropagation());
    addBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const node = state.nodes.find(n => n.id === el.dataset.id);
      if(!node) return;
      addNode(node.x + 220, node.y + (Math.random() * 80 - 40), 'New idea', node.id);
    });
    el.addEventListener('dblclick', (e) => {
      if(e.target === textEl) return;
      const node = state.nodes.find(n => n.id === el.dataset.id);
      if(!node) return;
      addNode(node.x + 220, node.y + (Math.random() * 80 - 40), 'New idea', node.id);
    });
  }

  function drawConnectors(){
    const rects = new Map();
    for(const n of state.nodes){
      const el = nodesLayer.querySelector(`[data-id="${n.id}"]`);
      if(el) rects.set(n.id, { w: el.offsetWidth, h: el.offsetHeight });
    }
    let svgHtml = '';
    for(const n of state.nodes){
      if(!n.parentId) continue;
      const parent = state.nodes.find(p => p.id === n.parentId);
      if(!parent) continue;
      const pr = rects.get(parent.id) || { w: 140, h: 44 };
      const cr = rects.get(n.id) || { w: 140, h: 44 };
      const x1 = parent.x + pr.w / 2, y1 = parent.y + pr.h / 2;
      const x2 = n.x + cr.w / 2, y2 = n.y + cr.h / 2;
      svgHtml += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${n.color}" stroke-width="2" stroke-opacity="0.55" stroke-linecap="round"/>`;
    }
    connectorSvg.innerHTML = svgHtml;
  }

  document.getElementById('addNodeBtn').addEventListener('click', () => {
    const c = viewCenterWorld();
    const node = addNode(c.x - 70, c.y - 22, 'New idea', null);
    requestAnimationFrame(() => {
      const el = nodesLayer.querySelector(`[data-id="${node.id}"]`);
      if(el){
        const textEl = el.querySelector('.node-text');
        textEl.focus();
        document.execCommand('selectAll', false, null);
      }
    });
  });

  // ---------------- draggable images ----------------
  function addImage(src, naturalW, naturalH){
    const c = viewCenterWorld();
    const maxDim = 320;
    let w = naturalW, h = naturalH;
    if(w > maxDim || h > maxDim){
      const ratio = Math.min(maxDim / w, maxDim / h);
      w *= ratio; h *= ratio;
    }
    const img = { id: 'i' + (nextId++), x: c.x - w / 2, y: c.y - h / 2, w, h, src };
    state.images.push(img);
    renderImages();
    return img;
  }

  function deleteImage(id){
    const before = state.images.length;
    state.images = state.images.filter(i => i.id !== id);
    if(state.images.length !== before) renderImages();
  }

  function renderImages(){
    const seen = new Set();
    for(const img of state.images){
      seen.add(img.id);
      let el = imagesLayer.querySelector(`[data-id="${img.id}"]`);
      if(!el){
        el = document.createElement('div');
        el.className = 'img-item';
        el.dataset.id = img.id;
        el.innerHTML = `<button class="img-del" title="Delete">×</button><img src="${img.src}" draggable="false"><div class="img-resize" title="Resize"></div>`;
        imagesLayer.appendChild(el);
        wireImageEl(el, img);
      }
      el.style.left = img.x + 'px';
      el.style.top = img.y + 'px';
      el.style.width = img.w + 'px';
      el.style.height = img.h + 'px';
    }
    imagesLayer.querySelectorAll('.img-item').forEach(el => {
      if(!seen.has(el.dataset.id)) el.remove();
    });
  }

  function wireImageEl(el, imgRef){
    const delBtn = el.querySelector('.img-del');
    const resizeHandle = el.querySelector('.img-resize');
    let dragInfo = null;
    let resizeInfo = null;

    el.addEventListener('pointerdown', (e) => {
      if(e.target === delBtn || e.target === resizeHandle) return;
      e.stopPropagation();
      clearSelection();
      state.selectedId = el.dataset.id;
      el.classList.add('selected');
      const img = state.images.find(i => i.id === el.dataset.id);
      if(!img) return;
      dragInfo = { startX: e.clientX, startY: e.clientY, ix: img.x, iy: img.y };
      el.classList.add('dragging');
      el.setPointerCapture(e.pointerId);
    });
    el.addEventListener('pointermove', (e) => {
      if(!dragInfo) return;
      const img = state.images.find(i => i.id === el.dataset.id);
      if(!img) return;
      img.x = dragInfo.ix + (e.clientX - dragInfo.startX) / view.scale;
      img.y = dragInfo.iy + (e.clientY - dragInfo.startY) / view.scale;
      el.style.left = img.x + 'px';
      el.style.top = img.y + 'px';
    });
    function endDrag(){ dragInfo = null; el.classList.remove('dragging'); }
    el.addEventListener('pointerup', endDrag);
    el.addEventListener('pointercancel', endDrag);

    delBtn.addEventListener('pointerdown', (e) => e.stopPropagation());
    delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteImage(el.dataset.id); });

    resizeHandle.addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      const img = state.images.find(i => i.id === el.dataset.id);
      if(!img) return;
      resizeInfo = { startX: e.clientX, startY: e.clientY, iw: img.w, ih: img.h, ratio: img.w / img.h };
      resizeHandle.setPointerCapture(e.pointerId);
    });
    resizeHandle.addEventListener('pointermove', (e) => {
      if(!resizeInfo) return;
      const img = state.images.find(i => i.id === el.dataset.id);
      if(!img) return;
      let newW = Math.max(40, resizeInfo.iw + (e.clientX - resizeInfo.startX) / view.scale);
      let newH = newW / resizeInfo.ratio;
      img.w = newW; img.h = newH;
      el.style.width = img.w + 'px';
      el.style.height = img.h + 'px';
    });
    function endResize(){ resizeInfo = null; }
    resizeHandle.addEventListener('pointerup', endResize);
    resizeHandle.addEventListener('pointercancel', endResize);
  }

  document.getElementById('addImageBtn').addEventListener('click', () => {
    document.getElementById('imageInput').click();
  });
  document.getElementById('imageInput').addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const im = new Image();
      im.onload = () => addImage(ev.target.result, im.naturalWidth, im.naturalHeight);
      im.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  });

  // init
  updateCursor();
  resizeCanvas();
  applyViewTransform();
})();
</script>
</body>
</html>
